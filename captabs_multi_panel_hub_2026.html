<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captabs Multi-Panel Hub 2026</title>
<style>
  :root {
    --bg:#f3f6fb;
    --panel:#ffffff;
    --panel-2:#f8fbff;
    --border:#d9e2f0;
    --text:#152033;
    --muted:#5d6c82;
    --accent:#2f6df6;
    --accent-2:#7c3aed;
    --good:#1d9e75;
    --warn:#f59e0b;
    --shadow:0 12px 30px rgba(25, 48, 92, .08);
  }
  * { box-sizing:border-box; }
  html, body { height:100%; margin:0; }
  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(180deg, #f7f9fd 0%, #eef4fb 100%);
    color: var(--text);
    display:flex;
    flex-direction:column;
  }
  .topbar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:14px 18px 10px;
  }
  .title-wrap h1 {
    margin:0;
    font-size:20px;
    line-height:1.1;
  }
  .title-wrap p {
    margin:4px 0 0;
    font-size:12px;
    color:var(--muted);
  }
  .actions {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .btn {
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    border-radius:10px;
    padding:9px 12px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
  }
  .btn:hover { border-color:#b9c8e0; }
  .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tabs {
    display:flex;
    gap:8px;
    padding:0 18px 12px;
    overflow:auto;
    scrollbar-width:thin;
  }
  .tab {
    border:none;
    background:#fff;
    color:var(--muted);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:var(--shadow);
  }
  .tab.active {
    color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color:transparent;
  }
  .page {
    display:none;
    height:calc(100vh - 112px);
    padding:0 18px 18px;
  }
  .page.active { display:block; }
  .page-card {
    height:100%;
    background:rgba(255,255,255,0.72);
    border:1px solid rgba(217,226,240,.9);
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow);
    backdrop-filter: blur(4px);
  }
  iframe.embedded {
    width:100%;
    height:100%;
    border:0;
    background:#fff;
  }

  /* Daily log */
  .log-shell {
    display:flex;
    flex-direction:column;
    height:100%;
    background:#fff;
  }
  .log-toolbar {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,#fbfdff,#f4f8fe);
  }
  .log-toolbar .left, .log-toolbar .right {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }
  .log-title {
    font-size:16px;
    font-weight:800;
    margin-right:10px;
  }
  .pill {
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--muted);
    border-radius:999px;
    padding:7px 10px;
    font-size:12px;
    font-weight:600;
  }
  .segmented {
    display:inline-flex;
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    background:#fff;
  }
  .segmented button {
    border:none;
    background:transparent;
    padding:8px 12px;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
    color:var(--muted);
  }
  .segmented button.active {
    background:var(--accent);
    color:#fff;
  }
  .log-table-wrap {
    flex:1;
    overflow:auto;
    background:#fff;
  }
  table.log-table {
    width:max(1400px,100%);
    border-collapse:separate;
    border-spacing:0;
    font-size:12px;
  }
  .log-table th, .log-table td {
    border-bottom:1px solid #edf2f8;
    border-right:1px solid #edf2f8;
    padding:8px 10px;
    vertical-align:middle;
    background:#fff;
  }
  .log-table th {
    position:sticky;
    top:0;
    z-index:3;
    background:#f8fbff;
    color:#35507c;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .log-table th:first-child,
  .log-table td:first-child {
    position:sticky;
    left:0;
    z-index:2;
    background:#fbfdff;
    min-width:130px;
    max-width:130px;
    font-weight:700;
  }
  .log-table th:first-child { z-index:4; }
  .log-table tr:hover td {
    background:#fafcff;
  }
  .log-table input[type="time"],
  .log-table input[type="number"],
  .log-table input[type="text"],
  .log-table select {
    width:100%;
    min-width:90px;
    border:1px solid #d9e2f0;
    border-radius:8px;
    padding:6px 8px;
    font-size:12px;
    background:#fff;
    color:var(--text);
  }
  .log-table input[type="checkbox"] {
    width:18px;
    height:18px;
    accent-color:var(--accent);
    cursor:pointer;
  }
  .gap-cell {
    min-width:110px;
    color:#46607f;
    font-weight:700;
    font-variant-numeric: tabular-nums;
  }
  .gap-cell.dim { color:#9aa8bc; font-weight:600; }
  .date-cell small {
    display:block;
    color:#7b8aa1;
    font-weight:600;
    margin-top:2px;
    font-size:10px;
  }
  .rating-wrap {
    min-width:170px;
    white-space:nowrap;
  }
  .stars {
    display:flex;
    flex-wrap:wrap;
    gap:2px;
  }
  .star {
    border:none;
    background:transparent;
    cursor:pointer;
    padding:0;
    font-size:14px;
    line-height:1;
    color:#d7deeb;
  }
  .star.on { color:#f5b301; }
  .star:hover { transform:scale(1.06); }
  .col-remove {
    display:block;
    margin-top:4px;
    border:none;
    background:none;
    color:#d33b3b;
    cursor:pointer;
    font-size:10px;
    font-weight:700;
  }
  .footer-note {
    padding:10px 16px;
    border-top:1px solid var(--border);
    color:var(--muted);
    font-size:11px;
    background:#fafcff;
  }
  @media (max-width: 900px) {
    .topbar { flex-direction:column; align-items:flex-start; }
    .page { height:calc(100vh - 155px); }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="title-wrap">
      <h1>Captabs Multi-Panel Hub</h1>
      <p>One file, four top tabs: Daily Log, DayFlow, Coding Workout, Finance Tracker.</p>
    </div>
    <div class="actions">
      <span class="pill">Auto-saves daily log in your browser</span>
      <button class="btn" id="jumpTodayBtn">Jump to Today</button>
    </div>
  </div>

  <div class="tabs" id="mainTabs">
    <button class="tab active" data-page="dailylog">Daily Log 2026</button>
    <button class="tab" data-page="dayflow">DayFlow</button>
    <button class="tab" data-page="coding">Coding Workout</button>
    <button class="tab" data-page="finance">Finance Tracker</button>
  </div>

  <section class="page active" id="page-dailylog">
    <div class="page-card">
      <div class="log-shell">
        <div class="log-toolbar">
          <div class="left">
            <div class="log-title">2026 Daily Planning + Tracking Panel</div>
            <div class="segmented" id="ratingModeToggle">
              <button class="active" data-mode="5">5-star mode</button>
              <button data-mode="10">10-star mode</button>
            </div>
            <button class="btn" id="addColumnBtn">Add column</button>
            <button class="btn" id="resetLogBtn">Reset daily log</button>
          </div>
          <div class="right">
            <button class="btn" id="exportCsvBtn">Export CSV</button>
          </div>
        </div>
        <div class="log-table-wrap" id="logTableWrap">
          <table class="log-table" id="logTable"></table>
        </div>
        <div class="footer-note">
          Date stays fixed on the left. Gap auto-calculates from wake time → work start. You can add custom columns to the right.
        </div>
      </div>
    </div>
  </section>

  <section class="page" id="page-dayflow">
    <div class="page-card"><iframe class="embedded" id="frame-dayflow" title="DayFlow"></iframe></div>
  </section>
  <section class="page" id="page-coding">
    <div class="page-card"><iframe class="embedded" id="frame-coding" title="Coding Workout"></iframe></div>
  </section>
  <section class="page" id="page-finance">
    <div class="page-card"><iframe class="embedded" id="frame-finance" title="Finance Tracker"></iframe></div>
  </section>

function decodeBase64Utf8(b64) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

const loadedFrames = new Set();
function loadFrame(name) {
  if (loadedFrames.has(name)) return;
  const frame = document.getElementById('frame-' + name);
  if (!frame) return;
  frame.srcdoc = decodeBase64Utf8(embeddedApps[name]);
  loadedFrames.add(name);
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const page = btn.dataset.page;
    document.getElementById('page-' + page).classList.add('active');
    if (embeddedApps[page]) loadFrame(page);
  });
});

const LOG_KEY = 'captabs_daily_log_2026_v1';
const defaultCustomColumns = [];
const ratingButtons = document.querySelectorAll('#ratingModeToggle button');
let state = {
  ratingMode: 5,
  customColumns: defaultCustomColumns,
  rows: {}
};

function pad(n) { return String(n).padStart(2, '0'); }

function getDates2026() {
  const out = [];
  const d = new Date('2026-01-01T00:00:00');
  while (d.getFullYear() === 2026) {
    const iso = d.toISOString().slice(0,10);
    const dayShort = d.toLocaleDateString('en-GB', { weekday:'short' });
    const label = `${dayShort}, ${pad(d.getDate())}:${pad(d.getMonth()+1)}`;
    out.push({
      iso,
      label,
      monthLabel: d.toLocaleDateString('en-GB', { month:'short' }),
      dayNumber: d.getDate()
    });
    d.setDate(d.getDate() + 1);
  }
  return out;
}
const dates2026 = getDates2026();

function blankRow() {
  return {
    wake: '',
    work: '',
    stretches: false,
    core: false,
    flexibility: false,
    gym: false,
    meditation: false,
    rating: 0,
    sleep: '',
    custom: {}
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(LOG_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === 'object') {
      state = {
        ratingMode: parsed.ratingMode === 10 ? 10 : 5,
        customColumns: Array.isArray(parsed.customColumns) ? parsed.customColumns : [],
        rows: parsed.rows && typeof parsed.rows === 'object' ? parsed.rows : {}
      };
    }
  } catch (e) {
    console.warn('Could not load saved daily log state', e);
  }
}

function saveState() {
  localStorage.setItem(LOG_KEY, JSON.stringify(state));
}

function ensureRow(iso) {
  if (!state.rows[iso]) state.rows[iso] = blankRow();
  if (!state.rows[iso].custom) state.rows[iso].custom = {};
  return state.rows[iso];
}

function timeToMinutes(value) {
  if (!value || !/^\d{2}:\d{2}$/.test(value)) return null;
  const [h,m] = value.split(':').map(Number);
  return h*60 + m;
}

function formatGap(wake, work) {
  const w = timeToMinutes(wake);
  const s = timeToMinutes(work);
  if (w === null || s === null) return { text:'—', dim:true };
  let diff = s - w;
  if (diff < 0) diff += 24*60;
  const hours = Math.floor(diff / 60);
  const mins = diff % 60;
  return {
    text: `${hours}h ${pad(mins)}m`,
    dim:false
  };
}

function csvEscape(value) {
  const s = value == null ? '' : String(value);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function renderStars(value, iso) {
  const max = state.ratingMode;
  let html = '<div class="stars">';
  for (let i=1; i<=max; i++) {
    html += `<button class="star ${i <= value ? 'on' : ''}" data-iso="${iso}" data-rating="${i}" title="${i}/${max}">★</button>`;
  }
  html += '</div>';
  return html;
}

function renderTable() {
  const table = document.getElementById('logTable');
  let thead = `
    <thead>
      <tr>
        <th>Date</th>
        <th>Wake up</th>
        <th>Work start</th>
        <th>Gap</th>
        <th>Stretches</th>
        <th>Core</th>
        <th>Flexibility</th>
        <th>Gym</th>
        <th>Meditation</th>
        <th>Day rating</th>
        <th>Sleep time</th>
        ${state.customColumns.map(col => `
          <th data-col-id="${col.id}">
            ${col.name}
            <button class="col-remove" data-remove-col="${col.id}" title="Remove column">Remove</button>
          </th>
        `).join('')}
      </tr>
    </thead>
  `;
  let rowsHtml = dates2026.map(d => {
    const row = ensureRow(d.iso);
    const gap = formatGap(row.wake, row.work);
    return `
      <tr data-iso="${d.iso}">
        <td class="date-cell">${d.label}<small>${d.iso}</small></td>
        <td><input type="time" data-field="wake" data-iso="${d.iso}" value="${row.wake || ''}"></td>
        <td><input type="time" data-field="work" data-iso="${d.iso}" value="${row.work || ''}"></td>
        <td class="gap-cell ${gap.dim ? 'dim' : ''}">${gap.text}</td>
        <td style="text-align:center;"><input type="checkbox" data-field="stretches" data-iso="${d.iso}" ${row.stretches ? 'checked' : ''}></td>
        <td style="text-align:center;"><input type="checkbox" data-field="core" data-iso="${d.iso}" ${row.core ? 'checked' : ''}></td>
        <td style="text-align:center;"><input type="checkbox" data-field="flexibility" data-iso="${d.iso}" ${row.flexibility ? 'checked' : ''}></td>
        <td style="text-align:center;"><input type="checkbox" data-field="gym" data-iso="${d.iso}" ${row.gym ? 'checked' : ''}></td>
        <td style="text-align:center;"><input type="checkbox" data-field="meditation" data-iso="${d.iso}" ${row.meditation ? 'checked' : ''}></td>
        <td class="rating-wrap">${renderStars(row.rating || 0, d.iso)}</td>
        <td><input type="time" data-field="sleep" data-iso="${d.iso}" value="${row.sleep || ''}"></td>
        ${state.customColumns.map(col => {
          const val = row.custom?.[col.id];
          if (col.type === 'checkbox') {
            return `<td style="text-align:center;"><input type="checkbox" data-custom-id="${col.id}" data-custom-type="checkbox" data-iso="${d.iso}" ${val ? 'checked' : ''}></td>`;
          }
          if (col.type === 'time') {
            return `<td><input type="time" data-custom-id="${col.id}" data-custom-type="time" data-iso="${d.iso}" value="${val || ''}"></td>`;
          }
          if (col.type === 'number') {
            return `<td><input type="number" step="any" data-custom-id="${col.id}" data-custom-type="number" data-iso="${d.iso}" value="${val ?? ''}"></td>`;
          }
          return `<td><input type="text" data-custom-id="${col.id}" data-custom-type="text" data-iso="${d.iso}" value="${val || ''}"></td>`;
        }).join('')}
      </tr>
    `;
  }).join('');
  table.innerHTML = thead + '<tbody>' + rowsHtml + '</tbody>';
  updateRatingToggleUI();
}

function updateRatingToggleUI() {
  ratingButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.mode) === state.ratingMode));
}

document.getElementById('logTable').addEventListener('input', (e) => {
  const iso = e.target.dataset.iso;
  if (!iso) return;
  const row = ensureRow(iso);

  if (e.target.dataset.field) {
    const field = e.target.dataset.field;
    row[field] = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
  }

  if (e.target.dataset.customId) {
    const colId = e.target.dataset.customId;
    row.custom[colId] = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
  }

  saveState();
  if (e.target.dataset.field === 'wake' || e.target.dataset.field === 'work') {
    const tr = e.target.closest('tr');
    const gapCell = tr.querySelector('.gap-cell');
    const gap = formatGap(row.wake, row.work);
    gapCell.textContent = gap.text;
    gapCell.classList.toggle('dim', gap.dim);
  }
});

document.getElementById('logTable').addEventListener('click', (e) => {
  const star = e.target.closest('.star');
  if (star) {
    const iso = star.dataset.iso;
    const rating = Number(star.dataset.rating);
    const row = ensureRow(iso);
    row.rating = row.rating === rating ? 0 : rating;
    saveState();
    renderTable();
    return;
  }
  const removeBtn = e.target.closest('[data-remove-col]');
  if (removeBtn) {
    const colId = removeBtn.dataset.removeCol;
    const col = state.customColumns.find(c => c.id === colId);
    if (!col) return;
    const ok = confirm(`Remove column "${col.name}" from the daily log?`);
    if (!ok) return;
    state.customColumns = state.customColumns.filter(c => c.id !== colId);
    Object.values(state.rows).forEach(row => {
      if (row.custom) delete row.custom[colId];
    });
    saveState();
    renderTable();
  }
});

ratingButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    state.ratingMode = Number(btn.dataset.mode);
    saveState();
    renderTable();
  });
});

document.getElementById('addColumnBtn').addEventListener('click', () => {
  const name = prompt('New column name?');
  if (!name) return;
  const rawType = prompt('Column type? Enter: text, checkbox, time, or number', 'text');
  if (!rawType) return;
  const type = rawType.trim().toLowerCase();
  if (!['text','checkbox','time','number'].includes(type)) {
    alert('Please enter one of: text, checkbox, time, number');
    return;
  }
  const id = 'c_' + Date.now().toString(36);
  state.customColumns.push({ id, name: name.trim(), type });
  dates2026.forEach(d => {
    const row = ensureRow(d.iso);
    if (!(id in row.custom)) row.custom[id] = type === 'checkbox' ? false : '';
  });
  saveState();
  renderTable();
});

document.getElementById('exportCsvBtn').addEventListener('click', () => {
  const headers = ['Date','Wake up','Work start','Gap','Stretches','Core','Flexibility','Gym','Meditation','Day rating','Sleep time', ...state.customColumns.map(c => c.name)];
  const lines = [headers.map(csvEscape).join(',')];
  dates2026.forEach(d => {
    const row = ensureRow(d.iso);
    const gap = formatGap(row.wake, row.work).text;
    const base = [
      d.iso,
      row.wake || '',
      row.work || '',
      gap === '—' ? '' : gap,
      row.stretches ? 'Yes' : '',
      row.core ? 'Yes' : '',
      row.flexibility ? 'Yes' : '',
      row.gym ? 'Yes' : '',
      row.meditation ? 'Yes' : '',
      row.rating || '',
      row.sleep || ''
    ];
    const custom = state.customColumns.map(c => {
      const val = row.custom?.[c.id];
      return c.type === 'checkbox' ? (val ? 'Yes' : '') : (val ?? '');
    });
    lines.push([...base, ...custom].map(csvEscape).join(','));
  });
  const blob = new Blob([lines.join('\n')], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'daily-log-2026.csv';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('resetLogBtn').addEventListener('click', () => {
  const ok = confirm('Reset the full Daily Log 2026 panel? This clears all saved rows and custom columns.');
  if (!ok) return;
  localStorage.removeItem(LOG_KEY);
  state = { ratingMode: 5, customColumns: [], rows: {} };
  renderTable();
});

document.getElementById('jumpTodayBtn').addEventListener('click', () => {
  const today = new Date();
  const iso = today.toISOString().slice(0,10);
  const todayRow = document.querySelector(`tr[data-iso="${iso}"]`);
  const dailyPageBtn = document.querySelector('.tab[data-page="dailylog"]');
  dailyPageBtn.click();
  if (todayRow) {
    todayRow.scrollIntoView({ behavior:'smooth', block:'center' });
  } else {
    document.getElementById('logTableWrap').scrollTo({ top:0, behavior:'smooth' });
  }
});

loadState();
renderTable();
</script>
</body>
</html>
